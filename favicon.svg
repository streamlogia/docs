<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#0d1117"/>

  <!-- subtle base rail -->
  <line x1="3" y1="16" x2="29" y2="16"
        stroke="#1e2730" stroke-width="1.5" stroke-linecap="round"/>

  <!-- heartbeat / pulse — represents live log stream activity -->
  <polyline
    points="3,16 9,16 12,7 16,25 20,16 29,16"
    fill="none"
    stroke="#f5a623"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- glowing peak dot -->
  <circle cx="12" cy="7" r="1.8" fill="#f5a623" opacity="0.9"/>
</svg>
